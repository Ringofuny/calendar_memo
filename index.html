<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>カレンダーメモ</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#007AFF">
</head>

<body>

<header>
    <button id="prevBtn">‹</button>
    <h1 id="monthLabel"></h1>
    <button id="nextBtn">›</button>
</header>

<div class="weekdays">
    <div>日</div>
    <div>月</div>
    <div>火</div>
    <div>水</div>
    <div>木</div>
    <div>金</div>
    <div>土</div>
</div>

<div id="calendar" class="calendar"></div>

<section class="detail">

<h2 id="selectedDate"></h2>

<div id="memoList"></div>

<div class="addMemo">

<input
id="titleInput"
placeholder="タイトル">

<textarea
id="contentInput"
placeholder="内容"></textarea>

<button id="saveBtn">
保存
</button>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
